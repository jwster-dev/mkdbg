name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  native-host-artifacts:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            host_os: linux
            host_arch: x86_64
          - runner: macos-14
            host_os: darwin
            host_arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Build native mkdbg host binary
        run: |
          set -euxo pipefail
          MKDBG_NATIVE_HOST_OS="${{ matrix.host_os }}" \
          MKDBG_NATIVE_HOST_ARCH="${{ matrix.host_arch }}" \
          bash tools/build_mkdbg_native.sh

      - name: Upload Native Host Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkdbg-native-${{ matrix.host_os }}-${{ matrix.host_arch }}-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          path: |
            build/mkdbg-native-${{ matrix.host_os }}-${{ matrix.host_arch }}

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: bash tools/ci_install_arm_toolchain_ubuntu.sh

      - name: Build
        run: bash tools/build.sh

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: bash tools/ci_install_arm_toolchain_ubuntu.sh

      - name: Run CI smoke
        run: bash tools/ci_smoke.sh

      - name: Build native mkdbg host binary
        run: bash tools/build_mkdbg_native.sh

      - name: Upload Smoke Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            build/generated/build_info.h
            build/MicroKernel_MPU.elf
            build/MicroKernel_MPU.hex
            build/MicroKernel_MPU.bin
            build/MicroKernel_MPU.map
            build/mkdbg-native

  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run host unit tests
        run: |
          set -euxo pipefail
          bash tools/vm32_host_tests.sh
          bash tools/kdi_host_tests.sh
          bash tools/sonic_lite_host_tests.sh
          bash tools/bringup_host_tests.sh
          bash tools/semantic_telemetry_host_tests.sh
          bash tools/dependency_graph_host_tests.sh
          bash tools/bringup_compile_host_tests.sh
          bash tools/bringup_ui_host_tests.sh
          bash tools/analysis_engine_host_tests.sh

  host-regress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run host regression and tooling checks
        run: |
          set -euxo pipefail
          bash tools/vm32_ci.sh
          bash tools/profile_compare_host_regress.sh
          bash tools/triage_bundle_host_tests.sh
          bash tools/triage_replay_host_tests.sh
          bash tools/regression_summary_host_tests.sh

      - name: Upload Host Regression Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host-regress-summary-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            build/regression_summary.json
            build/regression_summary.triage_bundle.json
